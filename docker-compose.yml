services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notion
      POSTGRES_USER: notion
      POSTGRES_PASSWORD: notion
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notion"]
      interval: 5s
      timeout: 5s
      retries: 5

  storage:
    image: fsouza/fake-gcs-server:latest
    ports:
      - "4443:4443"
    volumes:
      - gcsdata:/storage/data
    command: ["-scheme", "http", "-public-host", "localhost:4443"]

volumes:
  pgdata:
  gcsdata:
