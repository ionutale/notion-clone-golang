services:
  db:
    container_name: postgres-17-db
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notion
      POSTGRES_USER: notion
      POSTGRES_PASSWORD: notion
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notion"]
      interval: 5s
      timeout: 5s
      retries: 5

  storage:
    container_name: file-storage-bucket
    image: fsouza/fake-gcs-server:latest
    ports:
      - "4443:4443"
    volumes:
      - gcsdata:/storage/data
    command: ["-scheme", "http", "-public-host", "localhost:4443"]

  app:
    container_name: notion-clone-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://notion:notion@postgres-17-db:5432/notion?sslmode=disable
      PORT: "8080"
      STORAGE_EMULATOR_HOST: http://file-storage-bucket:4443
      JWT_SECRET: development-jwt-secret-change-in-production
    volumes:
      - ./data/uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  gcsdata:
